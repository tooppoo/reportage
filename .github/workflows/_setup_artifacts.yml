name: Setup artifacts workflow

on:
  workflow_call:
    outputs:
      artifact_name:
        description: "The name of the artifact containing all archives"
        value: ${{ jobs.setup_artifacts.outputs.artifact_name }}

jobs:
  create_archive:
    name: Create archive for ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-24.04
          - name: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: toml-cli
          locked: true

      - name: Package archive and checksum
        shell: bash
        id: archive
        run: just archive dist

      - name: Upload archive and checksum
        uses: actions/upload-artifact@v7
        with:
          name: reportage-archive-${{ matrix.name }}
          path: dist
          if-no-files-found: error

  setup_artifacts:
    name: Setup artifacts with all archives
    runs-on: ubuntu-latest
    needs: create_archive
    outputs:
      artifact_name: ${{ steps.output.outputs.artifact_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: toml-cli
          locked: true

      - name: Get all sets of archive and checksum
        uses: actions/download-artifact@v8
        with:
          path: downloaded
          pattern: reportage-archive-*
          merge-multiple: true

      - name: collect files as artifact
        run: just archive-collect downloaded dist

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: dist

      - name: output artifact name
        id: output
        run: echo "artifact_name=artifacts" >> "$GITHUB_OUTPUT"
