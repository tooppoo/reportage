name: Setup artifacts workflow

on:
  workflow_call:
    outputs:
      artifact_name:
        description: "The name of the artifact containing all archives"
        value: ${{ jobs.setup_artifacts.outputs.artifact_name }}

jobs:
  create_archive:
    name: Create archive for ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - name: x86_64
            runner: ubuntu-24.04
          - name: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: toml-cli
          locked: true

      - name: Package archive and checksum
        shell: bash
        id: archive
        run: |
          just archive dist > files
          mapfile -t outputs < files
          echo "archive=${outputs[0]}" >> "$GITHUB_OUTPUT"
          echo "checksum=${outputs[1]}" >> "$GITHUB_OUTPUT"

      - name: Upload archive and checksum
        uses: actions/upload-artifact@v7
        with:
          name: reportage-archive-${{ matrix.name }}
          path:
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.checksum }}
          if-no-files-found: error

  setup_artifacts:
    name: Setup artifacts with all archives
    runs-on: ubuntu-latest
    needs: create_archive
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Get all archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: reportage-archive-*

      - name: create checksum for all archives
        shell: bash
        run:
          cat dist/checksum_* > dist/checksums.txt
          rm dist/checksum_*

      - name: upload all archives and checksums as artifact
        uses: actions/upload-artifact@v7
        with:
          name: reportage-archives
          path: dist

      - name: output artifact name
        id: output
        run: echo "artifact_name=reportage-archives" >> "$GITHUB_OUTPUT"
