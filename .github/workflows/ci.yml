name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-nextest
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-llvm-cov
          locked: true
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check
        run: just check

      - name: Check grammar documentation
        run: just lang-docs-check

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: ${{ always() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # required for private repos or protected branches
          files: cov.json
          fail_ci_if_error: true
          use_oidc: true

  assert-archive:
    name: Assert archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/workflows/_setup_artifacts.yml
        id: setup_artifacts
      - name: Get Archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ steps.setup_artifacts.outputs.artifact_name }}
          path: dist

      - name: Verify artifact contents
        run: scripts/release/assertion/assert_archive.sh "$(scripts/release/get-version.sh)" dist

      - name: Verify checksum
        shell: bash
        run: echo "TODO"

      - name: Run extracted binary smoke test
        shell: bash
        run: echo "TODO"
