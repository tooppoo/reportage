name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit and Integration tests
    permissions:
      contents: read
      id-token: write # for codecov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-nextest
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-llvm-cov
          locked: true
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check
        run: just check

      - name: Check grammar documentation
        run: just lang-docs-check

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: ${{ always() }}
        with:
          files: cov.json
          fail_ci_if_error: true
          use_oidc: true

  setup-artifacts:
    uses: ./.github/workflows/_setup_artifacts.yml

  assert-archive:
    name: Assert archive
    runs-on: ubuntu-latest
    needs: setup-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: toml-cli
          locked: true

      - name: Get Archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup-artifacts.outputs.artifact_name }}
          path: dist
      - name: Get current version
        id: get-version
        run: echo "version=$(just get-version)" >> $GITHUB_OUTPUT

      - name: assert artifacts
        uses: tooppoo/fs-assert-action@latest
        with:
          root: dist
          manifest: |
            version: 1
            subjects:
              - path: VERSION
                assertions:
                  - exists
                  - is_regular_file
                  - line_count:
                      equals: 1
              - path: checksums.txt
                assertions:
                  - exists
                  - is_regular_file
                  - line_count:
                      equals: 4
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_x86_64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_aarch64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_x86_64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_arm64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball

      - name: extract archives
        run: |
          linux_x86_64="reportage_${{ steps.get-version.outputs.version }}_Linux_x86_64"
          linux_aarch64="reportage_${{ steps.get-version.outputs.version }}_Linux_aarch64"
          darwin_x86_64="reportage_${{ steps.get-version.outputs.version }}_Darwin_x86_64"
          darwin_arm64="reportage_${{ steps.get-version.outputs.version }}_Darwin_arm64"

          mkdir -p "dist/$linux_x86_64" "dist/$linux_aarch64" "dist/$darwin_x86_64" "dist/$darwin_arm64"
          tar -xzvf "dist/$linux_x86_64.tar.gz" -C "dist/$linux_x86_64"
          tar -xzvf "dist/$linux_aarch64.tar.gz" -C "dist/$linux_aarch64"
          tar -xzvf "dist/$darwin_x86_64.tar.gz" -C "dist/$darwin_x86_64"
          tar -xzvf "dist/$darwin_arm64.tar.gz" -C "dist/$darwin_arm64"
          find ./dist # debug

      - name: assert extracted files
        uses: tooppoo/fs-assert-action@latest
        with:
          root: dist
          manifest: |
            version: 1
            subjects:
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_x86_64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_aarch64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_x86_64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_arm64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable

  smoke-test:
    name: Smoke test for ${{ matrix.arch }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            os: Linux
            arch: x86_64

          - runner: ubuntu-24.04-arm
            os: Linux
            arch: aarch64

          - runner: macos-15-intel
            os: Darwin
            arch: x86_64

          - runner: macos-15
            os: Darwin
            arch: arm64

    runs-on: ${{ matrix.runner }}
    needs: setup-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: toml-cli
          locked: true

      - name: Get Archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup-artifacts.outputs.artifact_name }}
          path: dist
      - name: Get current version
        id: get-version
        run: echo "version=$(just get-version)" >> $GITHUB_OUTPUT

      - name: Extract archive
        run: |
          find ./dist # debug

          target="reportage_${{ steps.get-version.outputs.version }}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p "dist/${target}"
          tar -xzvf "./dist/${target}.tar.gz" -C "dist/${target}"

          mkdir bin
          cp "dist/${target}/reportage" ./bin/reportage

      - name: run smoke test
        run: ./bin/reportage --help

  installer-smoke-test-pinned:
    name: Installer smoke test (pinned version) for ${{ matrix.os }}(${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            os: Linux
            arch: x86_64

          - runner: ubuntu-24.04-arm
            os: Linux
            arch: aarch64

          - runner: macos-15-intel
            os: Darwin
            arch: x86_64

          - runner: macos-15
            os: Darwin
            arch: arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Ask install.sh's own latest-resolution path for the version to pin, instead of
      # a hardcoded version string (which would silently go stale as new releases ship)
      # or reimplementing that resolution against a specific release asset here (which
      # would drift from install.sh's actual mechanism as install.sh evolves).
      - name: Resolve version to pin
        id: resolve
        run: |
          log="$RUNNER_TEMP/install-resolve.log"
          sh install.sh --install-dir "$RUNNER_TEMP/reportage-installer-smoke-test-resolve" 2>&1 | tee "$log"

          version=$(grep -o 'resolved latest version .*' "$log" | awk '{print $NF}')
          [ -n "$version" ] || { echo "failed to resolve latest release version"; exit 1; }
          echo "pinning to version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Install via install.sh (pinned version)
        run: sh install.sh --version "${{ steps.resolve.outputs.version }}" --install-dir "$RUNNER_TEMP/reportage-installer-smoke-test-pinned"

      - name: run smoke test
        run: $RUNNER_TEMP/reportage-installer-smoke-test-pinned/reportage --help

  installer-smoke-test-latest:
    name: Installer smoke test (latest resolution) for ${{ matrix.os }}(${{ matrix.arch }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            os: Linux
            arch: x86_64

          - runner: ubuntu-24.04-arm
            os: Linux
            arch: aarch64

          - runner: macos-15-intel
            os: Darwin
            arch: x86_64

          - runner: macos-15
            os: Darwin
            arch: arm64

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # install.sh resolves "latest" through GitHub's "latest release" pointer, not a
      # mutable "latest" Git tag; this step captures the concrete version it resolves to
      # so later steps assert against that, not the literal string "latest".
      - name: Install via install.sh (latest)
        id: install
        run: |
          install_dir="$RUNNER_TEMP/reportage-installer-smoke-test-latest"
          log="$RUNNER_TEMP/install-latest.log"

          sh install.sh --install-dir "$install_dir" 2>&1 | tee "$log"

          resolved_version=$(grep -o 'resolved latest version .*' "$log" | awk '{print $NF}')
          [ -n "$resolved_version" ] || { echo "failed to capture resolved version from installer log"; exit 1; }

          echo "requested version: latest"
          echo "resolved version: $resolved_version"

          echo "install_dir=$install_dir" >> "$GITHUB_OUTPUT"
          echo "resolved_version=$resolved_version" >> "$GITHUB_OUTPUT"

      - name: run smoke test
        run: ${{ steps.install.outputs.install_dir }}/reportage --help

      - name: verify installed binary matches the resolved version
        run: |
          resolved_version="${{ steps.install.outputs.resolved_version }}"
          expected_version="${resolved_version#v}"
          actual_version=$("${{ steps.install.outputs.install_dir }}/reportage" --version | awk '{print $NF}')

          echo "resolved version (installer): $resolved_version"
          echo "installed binary version: $actual_version"

          [ "$expected_version" = "$actual_version" ] || {
            echo "version mismatch: expected $expected_version, got $actual_version"
            exit 1
          }

  e2e:
    name: E2E(self testing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true

      - name: Install Reportage
        run: just self-install

      - name: Run E2E
        run: reportage

  examples:
    name: Run examples actually
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true

      - name: Install Reportage
        run: just self-install

      - name: Run Examples
        run: reportage --config reportage.examples.kdl
