name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit and Integration tests
    permissions:
      contents: read
      id-token: write # for codecov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Go
        # required for examples
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.24"
      - name: Set up Node.js
        # required for examples
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-nextest
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: cargo-llvm-cov
          locked: true
      - run: rustup toolchain install stable --profile minimal
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check
        run: just check

      - name: Check grammar documentation
        run: just lang-docs-check

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: ${{ always() }}
        with:
          files: cov.json
          fail_ci_if_error: true
          use_oidc: true

  setup-artifacts:
    uses: tooppoo/github-release-workflows/.github/workflows/wf-cross-platform-build.yml@main
    with:
      config_path: .github/workflows/artifacts.manifest.json

  assert-archive:
    name: Assert archive
    runs-on: ubuntu-latest
    needs: setup-artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: toml-cli
          locked: true

      - name: Get Archive
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup-artifacts.outputs.artifact_name }}
          path: dist
      - name: Get current version
        id: get-version
        run: echo "version=$(just get-version)" >> $GITHUB_OUTPUT

      - name: assert artifacts
        uses: tooppoo/fs-assert-action@latest
        with:
          root: dist
          manifest: |
            version: 1
            subjects:
              - path: checksums.txt
                assertions:
                  - exists
                  - is_regular_file
                  - line_count:
                      equals: 4
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_x86_64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_aarch64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_x86_64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_arm64.tar.gz
                assertions:
                  - exists
                  - is_regular_file
                  - is_tarball

      - name: extract archives
        run: |
          linux_x86_64="reportage_${{ steps.get-version.outputs.version }}_Linux_x86_64"
          linux_aarch64="reportage_${{ steps.get-version.outputs.version }}_Linux_aarch64"
          darwin_x86_64="reportage_${{ steps.get-version.outputs.version }}_Darwin_x86_64"
          darwin_arm64="reportage_${{ steps.get-version.outputs.version }}_Darwin_arm64"

          mkdir -p "dist/$linux_x86_64" "dist/$linux_aarch64" "dist/$darwin_x86_64" "dist/$darwin_arm64"
          tar -xzvf "dist/$linux_x86_64.tar.gz" -C "dist/$linux_x86_64"
          tar -xzvf "dist/$linux_aarch64.tar.gz" -C "dist/$linux_aarch64"
          tar -xzvf "dist/$darwin_x86_64.tar.gz" -C "dist/$darwin_x86_64"
          tar -xzvf "dist/$darwin_arm64.tar.gz" -C "dist/$darwin_arm64"
          find ./dist # debug

      - name: assert extracted files
        uses: tooppoo/fs-assert-action@latest
        with:
          root: dist
          manifest: |
            version: 1
            subjects:
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_x86_64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable
              - path: reportage_${{ steps.get-version.outputs.version }}_Linux_aarch64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_x86_64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable
              - path: reportage_${{ steps.get-version.outputs.version }}_Darwin_arm64/reportage
                assertions:
                  - exists
                  - is_regular_file
                  - is_executable

  installer-smoke-test:
    uses: tooppoo/github-release-workflows/.github/workflows/wf-installer-smoke-test.yml@main
    with:
      config_path: .github/workflows/artifacts.manifest.json

  e2e:
    name: E2E(self testing)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true

      - name: Install Reportage
        run: just self-install

      - name: Run E2E
        run: reportage

  examples:
    name: Run examples actually
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: just
          locked: true

      - name: Install Reportage
        run: just self-install

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.24"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: build go shim example's coverage-instrumented binary
        run: just examples-shim::go-build

      - name: build rust shim example's coverage-instrumented binary
        run: just examples-shim::rust-build

      - name: install javascript shim example's dependencies
        run: just examples-shim::js-install

      - name: Run Examples
        run: reportage --config reportage.examples.kdl

      - name: check javascript shim example coverage is 100%
        run: just examples-shim::js-coverage-100

      - name: check go shim example coverage is 100%
        run: just examples-shim::go-coverage-100

      - name: check rust shim example coverage is 100%
        run: just examples-shim::rust-coverage-100

  vscode-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        # required for examples
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
        with:
          # working-directory affect only `run` step, not `uses` step
          # so we need to set package_json_file explicitly for `uses` step
          # https://docs.github.com/ja/actions/how-tos/write-workflows/choose-what-workflows-do/set-default-values-for-jobs
          package_json_file: editors/vscode/package.json
          cache_dependency_path: editors/vscode/pnpm-lock.yaml
          cache: true

      - run: pnpm install
      # Fail on a stale committed README before `package` regenerates it,
      # because regeneration would otherwise mask the drift in CI.
      - run: pnpm run check:readme
      - run: pnpm run package
