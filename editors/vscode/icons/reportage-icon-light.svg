  <path d="M91 40h13L78 8v19c0 7.2 5.8 13 13 13z" fill="#ffffff" opacity="0.25"/>

  <text x="64" y="85"
        text-anchor="middle"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
