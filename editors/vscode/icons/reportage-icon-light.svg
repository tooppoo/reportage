<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Reportage file icon light theme">
  <defs>
    <linearGradient id="pageFillLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#48d64d"/>
      <stop offset="100%" stop-color="#21a128"/>
    </linearGradient>
    <linearGradient id="foldFillLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d2f8d4"/>
      <stop offset="100%" stop-color="#7ed985"/>
    </linearGradient>
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
